<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ring-Link 5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#080814;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;font-family:'Segoe UI',Meiryo,Arial,sans-serif;color:#ddd;user-select:none;
  padding:8px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.logo-title{font-size:clamp(32px,8vw,60px);letter-spacing:clamp(6px,2.5vw,16px);
  margin-bottom:2px;text-transform:uppercase;font-weight:bold}
.logo-main{color:#8899aa;text-shadow:0 0 28px rgba(160,160,220,0.35)}
.logo-num{color:#99aadd;text-shadow:0 0 30px rgba(120,140,255,0.6)}
.logo-tag{font-size:clamp(10px,2.2vw,13px);letter-spacing:clamp(2px,1.5vw,6px);
  color:#334455;margin-bottom:6px;text-transform:uppercase}
/* デコレーションリング */
@keyframes rfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes rfloatR{0%,100%{transform:translateY(-8px)}50%{transform:translateY(8px)}}
.dr{position:absolute;border-radius:50%;pointer-events:none;border:2.5px solid}
.dr.p1{border-color:rgba(255,80,80,0.75);box-shadow:0 0 22px rgba(255,60,60,0.45),inset 0 0 14px rgba(255,60,60,0.1)}
.dr.p2{border-color:rgba(80,80,255,0.75);box-shadow:0 0 22px rgba(60,60,255,0.45),inset 0 0 14px rgba(60,60,255,0.1)}
.dr.s0{width:72px;height:72px;animation:rfloat 3.2s ease-in-out infinite}
.dr.s1{width:52px;height:52px;animation:rfloatR 4.1s ease-in-out infinite}
.dr.s2{width:96px;height:96px;animation:rfloat 5.0s ease-in-out infinite}
.dr.s3{width:40px;height:40px;animation:rfloatR 3.7s ease-in-out infinite}
#wrap{position:relative;width:100%;max-width:800px}
canvas{display:block;width:100%;height:auto;background:#0d0d22;border:1.5px solid #2d2d55;border-radius:6px;cursor:crosshair;touch-action:none}
#msg{margin-top:8px;font-size:clamp(11px,3vw,14px);text-align:center;color:#777;letter-spacing:1px;min-height:18px;width:100%;max-width:800px}
#rules{margin-top:6px;font-size:clamp(9px,2.2vw,11px);color:#666;text-align:center;max-width:800px;line-height:1.7;padding:0 4px}
/* ゲーム終了 大テキスト（盤面を暗転させない） */
#over{display:none;position:absolute;inset:0;border-radius:6px;
      flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#over.show{display:flex}
#over-title{font-size:clamp(36px,10vw,64px);font-weight:bold;letter-spacing:4px;
  text-shadow:0 0 30px currentColor, 0 0 60px currentColor, 0 2px 12px #000;
  animation:overpop .35s cubic-bezier(.2,1.4,.4,1) both}
@keyframes overpop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

/* コーナーバッジ（大テキスト後に表示） */
#over-corner{display:none;position:absolute;top:10px;right:10px;
  background:rgba(4,4,16,0.88);border-radius:8px;padding:6px 14px;
  border:1px solid #333;pointer-events:none}
#over-corner.show{display:block}
#over-corner-title{font-size:clamp(11px,3vw,14px);font-weight:bold;letter-spacing:2px}

/* RESTARTボタン・UNDOボタン（盤面の下） */
#restart-area{display:none;margin-top:12px}
#restart-area.show{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap}
#btn-undo{padding:10px 24px;font-size:clamp(12px,3.5vw,14px);letter-spacing:2px;text-transform:uppercase;
  background:#111;color:#886622;border:2px solid #443311;border-radius:8px;
  cursor:pointer;transition:all .2s}
#btn-undo:hover,#btn-undo:active{background:#1a1208;border-color:#886622;color:#ffaa44}
#btn-restart{padding:10px 38px;font-size:clamp(12px,3.5vw,15px);letter-spacing:3px;text-transform:uppercase;
  background:#111;color:#aaa;border:2px solid #2a2a3a;border-radius:8px;
  cursor:pointer;transition:all .2s}
#btn-restart:hover,#btn-restart:active{background:#1a1a2e;border-color:#555;color:#eee}
#start{position:fixed;inset:0;background:rgba(4,4,16,.97);z-index:20;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
       overflow-y:auto;padding:20px 8px;}
#start-label{font-size:clamp(9px,2.5vw,11px);letter-spacing:3px;color:#444;text-transform:uppercase}
.btn-mode{padding:12px 0;font-size:clamp(12px,3.5vw,14px);letter-spacing:2px;text-transform:uppercase;
  background:#111;color:#888;border:2px solid #2a2a3a;border-radius:8px;
  cursor:pointer;transition:all .2s;width:clamp(160px,50vw,220px)}
#btn-pvp,#btn-cpu{background:#26263e;border-color:#6060aa;color:#c0c0ee}
#btn-pvp:hover,#btn-pvp:active,
#btn-cpu:hover,#btn-cpu:active{background:#2e2e50;border-color:#8080cc;color:#ddddff}
#btn-tut{background:#162a1a;border-color:#4a9a55;color:#99dd99}
#btn-tut:hover,#btn-tut:active{background:#1e3a24;border-color:#66bb77;color:#bbffbb}
/* 難易度選択 */
#diff-select{display:none;flex-direction:column;align-items:center;gap:14px;width:100%}
#diff-label{font-size:clamp(12px,3vw,15px);letter-spacing:3px;color:#8899bb;text-transform:uppercase;margin-bottom:4px}
#btn-easy:hover,#btn-easy:active{background:#0d1a0d;border-color:#336633;color:#88ee88}
#btn-normal:hover,#btn-normal:active{background:#10101a;border-color:#333399;color:#8888ff}
#btn-hard:hover,#btn-hard:active{background:#1a0d0d;border-color:#883322;color:#ff8866}
#btn-back{padding:7px 20px;background:transparent;color:#7788aa;border:1px solid #445577;
  border-radius:6px;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .2s}
#btn-back:hover{color:#aabbcc;border-color:#6688aa}
/* チュートリアルパネル */
#tut-panel{display:none;width:100%;max-width:800px;
  background:rgba(6,6,20,0.97);border:1px solid #1a1a44;border-radius:8px;
  padding:14px 16px 16px;margin-top:10px}
#tut-panel.show{display:block}
#tut-counter{font-size:10px;letter-spacing:3px;color:#334466;
  text-transform:uppercase;margin-bottom:5px}
#tut-title-el{font-size:clamp(13px,3.8vw,17px);font-weight:bold;
  color:#bbccff;margin-bottom:7px}
#tut-body-el{font-size:clamp(11px,2.8vw,13px);color:#7788aa;
  line-height:1.7;white-space:pre-line}
#tut-btns{margin-top:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#tut-next{padding:7px 22px;background:#0d1a33;color:#7799cc;
  border:1px solid #2a4488;border-radius:6px;font-size:12px;
  letter-spacing:1px;cursor:pointer;transition:all .2s}
#tut-next:hover{background:#142240;border-color:#4466aa;color:#aaccff}
#tut-skip{margin-left:auto;padding:6px 14px;background:transparent;
  color:#334455;border:1px solid #1a2233;border-radius:6px;
  font-size:11px;cursor:pointer;transition:all .2s}
#tut-skip:hover{color:#667788;border-color:#2a3a4a}
#tut-end-btns{display:none;gap:8px}
#tut-end-btns.show{display:flex}
.tut-end-btn{padding:8px 18px;background:#111;color:#888;
  border:2px solid #2a2a3a;border-radius:7px;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
#tut-pvp:hover{background:#1a1010;border-color:#993333;color:#ff8888}
#tut-cpu:hover{background:#10101a;border-color:#333399;color:#8888ff}
/* 統計パネル */
#stats-box{width:100%;max-width:280px;text-align:center;margin-top:12px;padding-top:12px;
  border-top:2px solid #2a3a55}
.stats-label{font-size:12px;letter-spacing:3px;color:#8899bb;text-transform:uppercase;margin-bottom:8px}
.stats-row{font-size:clamp(13px,3.5vw,16px);color:#6a7a8a;letter-spacing:1px;margin-bottom:6px;line-height:2}
.stats-row .sn{color:#9ab8cc;font-weight:bold}
.stats-row .sw{color:#88bb55}
.stats-row .sl{color:#bb5555}
#stats-reset-btn{margin-top:10px;background:transparent;color:#7799aa;
  border:1px solid #445566;border-radius:6px;font-size:12px;letter-spacing:2px;
  padding:6px 16px;cursor:pointer;transition:all .2s}
#stats-reset-btn:hover{color:#aaccdd;border-color:#6699aa}
/* 難易度選択内の個別勝敗 */
#diff-stats{margin-top:8px;font-size:clamp(12px,3vw,14px);color:#7788aa;letter-spacing:1px;text-align:center;line-height:2}
#diff-stats span{margin:0 5px}
#diff-stats .sw{color:#88bb55}
#diff-stats .sl{color:#cc6655}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="800" height="620"></canvas>
  <div id="start">
    <!-- デコレーションリング（背景に浮かぶ） -->
    <div class="dr p1 s2" style="top:4%;left:3%;opacity:.9;animation-delay:0s"></div>
    <div class="dr p1 s0" style="top:10%;left:12%;opacity:.75;animation-delay:-1.1s"></div>
    <div class="dr p1 s1" style="top:22%;left:5%;opacity:.6;animation-delay:-2.3s"></div>
    <div class="dr p2 s2" style="bottom:5%;right:3%;opacity:.9;animation-delay:-0.7s"></div>
    <div class="dr p2 s0" style="bottom:12%;right:13%;opacity:.75;animation-delay:-1.8s"></div>
    <div class="dr p2 s1" style="bottom:22%;right:5%;opacity:.6;animation-delay:-3.0s"></div>
    <div class="dr p1 s3" style="top:55%;left:2%;opacity:.5;animation-delay:-2.0s"></div>
    <div class="dr p2 s3" style="top:40%;right:2%;opacity:.5;animation-delay:-0.4s"></div>
    <!-- タイトル -->
    <div class="logo-title"><span class="logo-main">Ring-Link</span> <span class="logo-num">5</span></div>
    <!-- モード選択パネル -->
    <div id="mode-select" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%">
      <button class="btn-mode" id="btn-pvp">👥 Player vs Player</button>
      <button class="btn-mode" id="btn-cpu">🤖 Player vs CPU</button>
      <button class="btn-mode" id="btn-tut">📖 チュートリアル</button>
    </div>
    <!-- 難易度選択パネル -->
    <div id="diff-select">
      <div id="diff-label">CPU 難易度</div>
      <button class="btn-mode" id="btn-easy">🌱 入門</button>
      <button class="btn-mode" id="btn-normal">⚔️ 普通</button>
      <button class="btn-mode" id="btn-hard">🔥 強い</button>
      <div id="diff-stats">
        <span id="dst-easy">入門 0-0</span> ／
        <span id="dst-normal">普通 0-0</span> ／
        <span id="dst-hard">強い 0-0</span>
      </div>
      <button id="btn-back">← 戻る</button>
    </div>
    <!-- 統計 -->
    <div id="stats-box">
      <div class="stats-label">Record</div>
      <div class="stats-row" id="stats-pvp-row">
        PvP &nbsp;— &nbsp;P1 <span class="sn" id="st-p1w">0</span>勝 &nbsp;／&nbsp; P2 <span class="sn" id="st-p2w">0</span>勝
      </div>
      <div class="stats-row" id="stats-cpu-row">
        対CPU — <span class="sw" id="st-cpu-w">0</span>勝 &nbsp;<span class="sl" id="st-cpu-l">0</span>敗
        &nbsp;<span style="color:#556677" id="st-cpu-rate"></span>
      </div>
      <button id="stats-reset-btn">リセット</button>
    </div>
  </div>
  <!-- 大テキスト（一時表示・盤面は透けて見える） -->
  <div id="over">
    <div id="over-title">WINNER!</div>
  </div>
  <!-- コーナーバッジ（大テキスト後に残る小表示） -->
  <div id="over-corner">
    <div id="over-corner-title"></div>
  </div>
</div>
<!-- チュートリアルパネル（盤面の下、通常UIの代わりに表示） -->
<div id="tut-panel">
  <div id="tut-counter">STEP 1 / 7</div>
  <div id="tut-title-el"></div>
  <div id="tut-body-el"></div>
  <div id="tut-btns">
    <button id="tut-next">次へ →</button>
    <div id="tut-end-btns">
      <button class="tut-end-btn" id="tut-pvp">👥 PvP</button>
      <button class="tut-end-btn" id="tut-cpu">🤖 CPU と対戦</button>
    </div>
    <button id="tut-skip">スキップ</button>
  </div>
</div>

<!-- RESTARTボタンは盤面の下 -->
<div id="restart-area">
  <button id="btn-undo">↩ 1手戻す</button>
  <button id="btn-restart">RESTART</button>
</div>
<div id="msg" style="display:none"></div>
<div id="rules" style="display:none">
  先に5個を直線に並べた方が勝ち ／ 円の中の数字は「気」（同色の隣人数＋1） ／
  ⚠黄色の円はアタリ（捕獲される危険あり） ／ 圧力（接する相手の円数）＞ 気 で捕獲 ／
  2手目以降は自分か相手の円に接する位置にのみ配置可
</div>
<div id="rules-link" style="display:none;margin-top:10px;text-align:center;">
  <a href="rules.html" target="_blank"
     style="font-size:12px;color:#7799bb;letter-spacing:2px;text-decoration:none;
            border-bottom:1px solid #446688;padding-bottom:1px;">
    詳しい遊び方・ルール →
  </a>
</div>

<script>
const W = 800, H = 620;
const R = 36;          // 円の半径
const WIN_N = 5;       // 勝利に必要な連結数
const SNAP_DIST = 2*R; // スナップ距離（ちょうど接触）
const SNAP_RANGE = R * 3.5; // クリック有効範囲

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const msgEl       = document.getElementById('msg');
const overEl      = document.getElementById('over');
const overTitle   = document.getElementById('over-title');
const overCorner  = document.getElementById('over-corner');
const overCornerTitle = document.getElementById('over-corner-title');
const restartArea = document.getElementById('restart-area');

let circles  = [];  // {x, y, r, p}
let turn     = 1;
let state    = 'play'; // 'play' | 'over'
let winGroup = [];
let mouse    = null;
let snapPos  = null;  // 現在のスナップ候補位置
let mode     = 'pvp'; // 'pvp' | 'cpu'
let touchActive = false;
let sealedSpots = []; // 封鎖中の座標 [{x, y, until}]  until はターン数
let totalTurns  = 0;  // 累計配置数（封鎖の期限管理に使用）
const SEAL_TURNS = 4; // 捕獲後に封鎖するターン数（両者2手ずつ）
let history = [];     // 手を戻すための状態履歴

// ======== チュートリアル ========
let tutorialMode = false;
let tutorialStep = 0;

// 各ステップの定義
const TUT = [
  // 0: ウェルカム（情報のみ）
  { title: 'Ring-Link 5 へようこそ！',
    body: '5個の円を直線状に並べると勝ちです。\nタップ・クリックで操作します。\nまず基本操作を体験しながら学びましょう。',
    type: 'info',
    setup() { circles=[]; turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play'; }
  },
  // 1: 最初の円（どこでも置ける）
  { title: '① 最初の円を置く',
    body: '最初の1手はどこにでも置けます。\n光っている場所をタップしてみましょう。',
    type: 'place',
    target: {x:400, y:260},
    tolerance: 999, // どこでも OK
    setup() { circles=[]; turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play'; }
  },
  // 2: 接触配置
  { title: '② 接触配置',
    body: '2手目からは、既存の円に\n「ぴったり接する」位置にしか置けません。\n矢印の場所に置いてみましょう。',
    type: 'place',
    target: {x:472, y:260},
    tolerance: 28,
    setup() { circles=[{x:400,y:260,r:R,p:1}]; turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play'; }
  },
  // 3: 直線チェーン
  { title: '③ 直線チェーン',
    body: '3個以上が直線状につながると\nチェーンラインが表示されます。\nもう1個、同じ向きに置いてみましょう。',
    type: 'place',
    target: {x:544, y:260},
    tolerance: 28,
    setup() { circles=[{x:400,y:260,r:R,p:1},{x:472,y:260,r:R,p:1}]; turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play'; }
  },
  // 4: 30°ルール
  { title: '④ 30° ルール',
    body: 'オレンジの弧は「直線と認められる範囲」です。\n弧の中に置くと直線が続きます。弧の外だと切れます。\n4個目を置いてみましょう。',
    type: 'place',
    target: {x:472, y:260},
    tolerance: 28,
    setup() { circles=[{x:256,y:260,r:R,p:1},{x:328,y:260,r:R,p:1},{x:400,y:260,r:R,p:1}]; turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play'; }
  },
  // 5: 気システム（情報のみ）
  { title: '⑤ 気（き）システム',
    body: '円の中の数字が「気」です。\n気 ＝ 1 ＋ 接している同色の円の数\n孤立した円は「1」、仲間が多いほど高くなります。\n気が高いほど捕獲されにくくなります。',
    type: 'info',
    setup() {
      circles=[
        {x:148,y:260,r:R,p:1},              // 孤立 qi=1
        {x:460,y:260,r:R,p:1},              // 3連の端 qi=2
        {x:532,y:260,r:R,p:1},              // 3連の中 qi=3
        {x:604,y:260,r:R,p:1},              // 3連の端 qi=2
      ];
      turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play';
    }
  },
  // 6: 捕獲
  { title: '⑥ 捕獲！',
    body: '圧力（接している相手の円数）＞ 気 になると\n円が捕獲されて消えます。\n黄色く光る円は「アタリ」のサインです。\n矢印の位置に置いて、青い円を捕獲しましょう。',
    type: 'place',
    target: {x:472, y:260},
    tolerance: 28,
    afterCapture: true,
    setup() {
      circles=[
        {x:328,y:260,r:R,p:1},  // 赤（P1）— 青に接する
        {x:400,y:260,r:R,p:2},  // 青（P2）qi=1, 圧力=1 → アタリ
      ];
      turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play';
    }
  },
  // 7: 5個並べて勝利
  { title: '⑦ 5個並べて勝利！',
    body: 'あと1個！5個を直線に並べると勝ちです。\n最後の円を置いてください。',
    type: 'place',
    target: {x:472, y:260},
    tolerance: 28,
    isWinStep: true,
    setup() {
      circles=[
        {x:184,y:260,r:R,p:1},
        {x:256,y:260,r:R,p:1},
        {x:328,y:260,r:R,p:1},
        {x:400,y:260,r:R,p:1},
      ];
      turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play';
    }
  },
  // 8: 完了
  { title: '🎉 チュートリアル完了！',
    body: 'Ring-Link 5 の基本をマスターしました！\nさあ、実際にプレイしましょう。',
    type: 'complete',
    setup() { circles=[]; turn=1; sealedSpots=[]; totalTurns=0; winGroup=[]; state='play'; }
  },
];

function startTutorial() {
  tutorialMode = true;
  tutorialStep = 0;
  document.getElementById('start').style.display = 'none';
  overEl.classList.remove('show');
  overCorner.classList.remove('show');
  restartArea.classList.remove('show');
  // 通常UIを隠してチュートリアルパネルを表示
  document.getElementById('msg').style.display = 'none';
  document.getElementById('rules').style.display = 'none';
  document.getElementById('rules-link').style.display = 'none';
  document.getElementById('tut-panel').classList.add('show');
  showTutStep(0);
}

function showTutStep(idx) {
  tutorialStep = idx;
  const step = TUT[idx];
  step.setup();
  winGroup = [];
  snapPos  = null;
  mouse    = null;

  const totalPlaceSteps = TUT.filter(s => s.type !== 'complete').length - 1; // ウェルカム除く
  const stepNum = idx === 0 ? 1 : idx;
  document.getElementById('tut-counter').textContent =
    step.type === 'complete' ? 'COMPLETE' : `STEP ${stepNum} / ${TUT.length - 2}`;
  document.getElementById('tut-title-el').textContent = step.title;
  document.getElementById('tut-body-el').textContent  = step.body;

  const nextBtn    = document.getElementById('tut-next');
  const endBtns    = document.getElementById('tut-end-btns');

  if (step.type === 'info') {
    nextBtn.style.display = 'inline-block';
    nextBtn.textContent   = '次へ →';
    endBtns.classList.remove('show');
  } else if (step.type === 'complete') {
    nextBtn.style.display = 'none';
    endBtns.classList.add('show');
  } else {
    // place ステップ：プレイヤーが正しい場所に置くまで進まない
    nextBtn.style.display = 'none';
    endBtns.classList.remove('show');
    msgEl.textContent = step.target ? '矢印の場所に置いてください' : '好きな場所に置いてください';
  }
  updateHUD();
}

function advanceTutorial() {
  if (tutorialStep >= TUT.length - 1) { endTutorial(); return; }
  showTutStep(tutorialStep + 1);
}

function endTutorial() {
  tutorialMode = false;
  document.getElementById('tut-panel').classList.remove('show');
  circles=[]; turn=1; state='play'; winGroup=[]; snapPos=null;
  sealedSpots=[]; totalTurns=0; history=[];
  overEl.classList.remove('show');
  overCorner.classList.remove('show');
  showStartScreen();
}

// チュートリアル中のターゲット表示（draw()から呼ぶ）
function drawTutorialIndicator() {
  if (!tutorialMode) return;
  const step = TUT[tutorialStep];
  if (!step || step.type !== 'place' || !step.target) return;

  const {x, y} = step.target;
  const t = performance.now();
  const pulse = 0.5 + 0.5 * Math.sin(t / 380);

  ctx.save();

  // 外側リング（金色・点滅）
  ctx.strokeStyle = `rgba(255,220,0,${0.65 + 0.35 * pulse})`;
  ctx.lineWidth   = 3;
  ctx.shadowBlur  = 22 * pulse;
  ctx.shadowColor = '#ffdd00';
  ctx.beginPath();
  ctx.arc(x, y, R + 10 + 5 * pulse, 0, Math.PI * 2);
  ctx.stroke();

  // 内側フィル（薄い金）
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = `rgba(255,220,0,${0.06 + 0.05 * pulse})`;
  ctx.beginPath();
  ctx.arc(x, y, R, 0, Math.PI * 2);
  ctx.fill();

  // 下向き矢印（バウンド）
  const bounce = 7 * Math.sin(t / 340);
  const ay     = y - R - 30 - bounce;
  ctx.fillStyle   = `rgba(255,220,0,${0.85 + 0.15 * pulse})`;
  ctx.shadowBlur  = 10;
  ctx.shadowColor = '#ffdd00';
  ctx.beginPath();
  ctx.moveTo(x,      ay + 16); // 下頂点
  ctx.lineTo(x - 11, ay);
  ctx.lineTo(x + 11, ay);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function saveState() {
  history.push({
    circles:     circles.map(c => ({...c})),
    turn,
    sealedSpots: sealedSpots.map(s => ({...s})),
    totalTurns
  });
  if (history.length > 30) history.shift(); // メモリ節約
}
const CPU_PL    = 2;
const CPU_DELAY = 1500; // ms（タッチ操作時に何が起きたかわかるよう余裕を持たせる）
let cpuDifficulty = 'normal'; // 'easy' | 'normal' | 'hard'
const TOUCH_LIFT = 100; // タッチ時にスナップ位置を指より上にずらすオフセット（canvas単位）

// ---- サウンド（Web Audio API） ----
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// 配置音：碁石が盤に置かれる「カチッ」
function soundPlace() {
  try {
    const ac = getAudioCtx();
    const t = ac.currentTime;

    // ── ① ノイズ成分：石と盤の衝突「カチ」
    const bufLen = Math.floor(ac.sampleRate * 0.055);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    // バンドパス：1.2kHz 付近の「カチ」帯域だけ通す
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 1200;
    bp.Q.value = 1.2;
    const nGain = ac.createGain();
    noise.connect(bp); bp.connect(nGain); nGain.connect(ac.destination);
    bp.frequency.value = 1800;  // 少し高めで軽く
    bp.Q.value = 1.0;
    nGain.gain.setValueAtTime(0.0001, t);
    nGain.gain.linearRampToValueAtTime(0.28, t + 0.002); // 打撃を軽めに
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.038);
    noise.start(t); noise.stop(t + 0.045);

    // ── ② 低域成分：盤の響き（控えめに）
    const sub = ac.createOscillator();
    const sGain = ac.createGain();
    sub.connect(sGain); sGain.connect(ac.destination);
    sub.type = 'sine';
    sub.frequency.value = 160; // 少し高めで軽く
    sGain.gain.setValueAtTime(0.0001, t);
    sGain.gain.linearRampToValueAtTime(0.10, t + 0.003);
    sGain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    sub.start(t); sub.stop(t + 0.075);
  } catch(e) {}
}

// 捕獲音：すうっと消える感じ（数が多いほど連続）
function soundCapture(count) {
  try {
    const ac = getAudioCtx();
    const n = Math.min(count, 4);
    for (let i = 0; i < n; i++) {
      const delay = i * 0.09;
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      const t = ac.currentTime + delay;
      osc.frequency.setValueAtTime(320, t);
      osc.frequency.exponentialRampToValueAtTime(65, t + 0.38);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
      osc.start(t); osc.stop(t + 0.42);
    }
  } catch(e) {}
}

// チェーン音：チェーン長に応じた柔らかいチャイム
function soundChain(length) {
  // 3→ミ、4→ミ+ソ、5→ミ+ソ+ラ+ド（落ち着いたアルペジオ）
  const notes = {
    3: [523],
    4: [523, 622],
    5: [523, 622, 698, 880],
  }[Math.min(length, 5)] || [523];
  try {
    const ac = getAudioCtx();
    notes.forEach((freq, i) => {
      const delay = i * 0.1;
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      const t = ac.currentTime + delay;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.17, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t); osc.stop(t + 0.6);
    });
  } catch(e) {}
}

// 勝利音：上昇アルペジオ
function soundWin() {
  const freqs = [440, 554, 659, 880];
  try {
    const ac = getAudioCtx();
    freqs.forEach((freq, i) => {
      const delay = i * 0.13;
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      const t = ac.currentTime + delay;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.start(t); osc.stop(t + 0.75);
    });
  } catch(e) {}
}

// ---- 幾何 ----
function d2(a, b) { return (a.x-b.x)**2 + (a.y-b.y)**2; }
function touching(a, b) { return d2(a, b) < (2*R + 2)**2; }

// 角度差（絶対値、π以下に正規化）
function angDiff(a, b) {
  let d = ((a - b) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
  return Math.abs(d);
}

const ANGLE_TOL = Math.PI / 6; // 30°

// ---- スナップ位置を求める ----
// クリック地点 (mx,my) に対して配置できる最適な円の位置を返す
function findSnap(mx, my) {
  // 1手目：盤内ならどこでも
  if (circles.length === 0) {
    return {
      x: Math.max(R+4, Math.min(W-R-4, mx)),
      y: Math.max(R+4, Math.min(H-R-4, my))
    };
  }

  // 近い円から順に試みる
  const cands = circles
    .map(c => ({ c, d: Math.hypot(mx-c.x, my-c.y) }))
    .filter(({d}) => d > R*0.3 && d <= SNAP_RANGE) // 円の内部すぎるものと遠すぎるものを除外
    .sort((a, b) => a.d - b.d);

  for (const {c} of cands) {
    const angle = Math.atan2(my - c.y, mx - c.x);
    const sx = c.x + Math.cos(angle) * SNAP_DIST;
    const sy = c.y + Math.sin(angle) * SNAP_DIST;

    // 盤端チェック
    if (sx < R+4 || sx > W-R-4 || sy < R+4 || sy > H-R-4) continue;

    // 既存の円と重ならないかチェック
    if (circles.some(e => Math.hypot(sx-e.x, sy-e.y) < SNAP_DIST - 2)) continue;

    // 封鎖チェック
    if (isSealed(sx, sy)) continue;

    // 禁手チェック（案1）：自殺手は不可。ただし同時に相手を捕獲できる場合は例外
    if (circles.length > 0) {
      const opp2 = turn === 1 ? 2 : 1;
      const tmp = {x: sx, y: sy, r: R, p: turn};
      circles.push(tmp);
      const newQi   = getQi(tmp);
      const newPress = getPressure(tmp, opp2);
      const wouldCapture = live().some(c =>
        c !== tmp && c.p === opp2 && touching(c, tmp) && getPressure(c, turn) > getQi(c)
      );
      circles.pop();
      if (newPress > newQi && !wouldCapture) continue; // 自殺手→スキップ
    }

    return {x: sx, y: sy};
  }
  return null;
}

// ---- 勝利判定（バックトラッキングDFS） ----
function checkWin(pl) {
  const pc = circles.filter(c => c.p === pl && !c.dying);

  function dfs(chain, curDir, used) {
    if (chain.length >= WIN_N) return chain;
    const last = chain[chain.length - 1];
    for (const c of pc) {
      if (used.has(c) || !touching(last, c)) continue;
      const nd = Math.atan2(c.y - last.y, c.x - last.x);
      if (angDiff(nd, curDir) > ANGLE_TOL) continue;
      used.add(c);
      const r = dfs([...chain, c], nd, used);
      used.delete(c);
      if (r) return r;
    }
    return null;
  }

  for (const a of pc) {
    for (const b of pc) {
      if (a === b || !touching(a, b)) continue;
      const dir = Math.atan2(b.y - a.y, b.x - a.x);
      const used = new Set([a, b]);
      const r = dfs([a, b], dir, used);
      if (r) return r;
    }
  }
  return null;
}

// ---- 直線チェーン列挙（バックトラッキングDFS、描画用3個以上） ----
function getLineChains(pl) {
  const pc = circles.filter(c => c.p === pl && !c.dying);
  if (pc.length < 3) return [];
  const seen = new Set();
  const chains = [];

  function dfs(chain, curDir, used) {
    const last = chain[chain.length - 1];
    let extended = false;
    for (const c of pc) {
      if (used.has(c) || !touching(last, c)) continue;
      const nd = Math.atan2(c.y - last.y, c.x - last.x);
      if (angDiff(nd, curDir) > ANGLE_TOL) continue;
      extended = true;
      used.add(c);
      dfs([...chain, c], nd, used);
      used.delete(c);
    }
    // 延伸できなくなった（末端）かつ長さ3以上のチェーンを記録
    if (!extended && chain.length >= 3) {
      const key = chain.map(c => circles.indexOf(c)).sort((a,b)=>a-b).join(',');
      if (!seen.has(key)) { seen.add(key); chains.push([...chain]); }
    }
  }

  for (const a of pc) {
    for (const b of pc) {
      if (a === b || !touching(a, b)) continue;
      const dir = Math.atan2(b.y - a.y, b.x - a.x);
      const used = new Set([a, b]);
      dfs([a, b], dir, used);
    }
  }

  // サブチェーン（より長いチェーンの部分集合）を除去
  return chains.filter(chain =>
    !chains.some(other => other.length > chain.length && chain.every(c => other.includes(c)))
  );
}


// ---- 気（qi）システム ----
// 生きている（dying でない）円だけを返す
function live() { return circles.filter(c => !c.dying); }

// 円の気 = 1 + 接している同色の生きている円の数
function getQi(c) {
  return 1 + live().filter(o => o !== c && o.p === c.p && touching(o, c)).length;
}

// 円に接している指定プレイヤーの生きている円の数（圧力）
function getPressure(c, byPl) {
  return live().filter(o => o.p === byPl && touching(o, c)).length;
}

// 封鎖チェック：指定座標が現在封鎖中かどうか
function isSealed(x, y) {
  return sealedSpots.some(s => s.until > totalTurns && Math.hypot(x - s.x, y - s.y) < SNAP_DIST - 2);
}

// 気による捕獲処理：newCircle を置いた後、圧力 > 気 の相手円を捕獲
function doQiCaptures(newCircle, pl) {
  const opp = pl === 1 ? 2 : 1;
  const toCapture = live().filter(c => {
    if (c.p !== opp || !touching(c, newCircle)) return false;
    return getPressure(c, pl) > getQi(c);
  });
  if (toCapture.length === 0) return 0;

  // 捕獲された位置を封鎖（両者 SEAL_TURNS 手間置けない）
  toCapture.forEach(c => {
    sealedSpots.push({x: c.x, y: c.y, until: totalTurns + SEAL_TURNS});
  });
  // 期限切れの封鎖を掃除
  sealedSpots = sealedSpots.filter(s => s.until > totalTurns);

  const t = performance.now();
  toCapture.forEach(c => { c.dying = true; c.dyingAt = t; });
  setTimeout(() => { circles = circles.filter(c => !c.dying); }, 650);
  return toCapture.length;
}

// ---- CPU AI ----
// 候補座標の自殺手チェック共通処理
function isValidCpuPos(sx, sy) {
  if (sx < R+4 || sx > W-R-4 || sy < R+4 || sy > H-R-4) return false;
  if (circles.some(e => Math.hypot(sx-e.x, sy-e.y) < SNAP_DIST - 2)) return false;
  if (isSealed(sx, sy)) return false;
  const oppC = CPU_PL === 1 ? 2 : 1;
  const tmpC = {x: sx, y: sy, r: R, p: CPU_PL};
  circles.push(tmpC);
  const ok = !(getPressure(tmpC, oppC) > getQi(tmpC) &&
    !live().some(o => o !== tmpC && o.p === oppC && touching(o, tmpC) && getPressure(o, CPU_PL) > getQi(o)));
  circles.pop();
  return ok;
}

// 配置可能な候補座標を列挙
function getCandidates() {
  if (circles.length === 0) return [{x: W/2, y: H/2}];
  const cands = [];

  // ① 全円から 48方向（7.5°刻み）の候補
  const STEPS = 48;
  for (const c of circles) {
    for (let i = 0; i < STEPS; i++) {
      const angle = (i / STEPS) * Math.PI * 2;
      const sx = c.x + Math.cos(angle) * SNAP_DIST;
      const sy = c.y + Math.sin(angle) * SNAP_DIST;
      if (!isValidCpuPos(sx, sy)) continue;
      if (cands.some(p => Math.hypot(p.x-sx, p.y-sy) < 6)) continue;
      cands.push({x: sx, y: sy});
    }
  }

  // ② 両プレイヤーのチェーン端に延長方向の候補を追加（見逃し防止）
  for (const pl of [1, 2]) {
    for (const chain of getLineChains(pl)) {
      if (chain.length < 2) continue;
      const ends = [
        [chain[1],              chain[0]],
        [chain[chain.length-2], chain[chain.length-1]]
      ];
      for (const [from, to] of ends) {
        const dir = Math.atan2(to.y - from.y, to.x - from.x);
        const sx  = to.x + Math.cos(dir) * SNAP_DIST;
        const sy  = to.y + Math.sin(dir) * SNAP_DIST;
        if (!isValidCpuPos(sx, sy)) continue;
        if (cands.some(p => Math.hypot(p.x-sx, p.y-sy) < 6)) continue;
        cands.push({x: sx, y: sy});
      }
    }
  }

  return cands;
}

// 候補位置のスコアを計算（難易度対応）
function scoreMove(pos) {
  const opp = 1;

  // ---- CPU が置いた場合の評価 ----
  const tmp = {x: pos.x, y: pos.y, r: R, p: CPU_PL};
  circles.push(tmp);
  if (checkWin(CPU_PL)) { circles.pop(); return 10000; }
  const myChains     = getLineChains(CPU_PL).filter(ch => ch.includes(tmp));
  const myBest       = myChains.reduce((m, ch) => Math.max(m, ch.length), 1);
  const my4Count     = myChains.filter(ch => ch.length >= 4).length;
  const my3Count     = myChains.filter(ch => ch.length >= 3).length;
  const captureCount = live().filter(c =>
    c.p === opp && touching(c, tmp) && getPressure(c, CPU_PL) > getQi(c)
  ).length;
  circles.pop();

  // ---- 相手が置いた場合（防御評価） ----
  const tmp2 = {x: pos.x, y: pos.y, r: R, p: opp};
  circles.push(tmp2);
  const oppWin    = !!checkWin(opp);
  const oppChains = getLineChains(opp).filter(ch => ch.includes(tmp2));
  const oppBest   = oppChains.reduce((m, ch) => Math.max(m, ch.length), 0);
  const opp4Count = oppChains.filter(ch => ch.length >= 4).length;
  const opp3Count = oppChains.filter(ch => ch.length >= 3).length;
  circles.pop();

  if (oppWin) return 5000; // 全難易度：相手の即勝はブロック

  // ── 入門：4連はブロック、チェーン延伸より運の要素が大きい ──
  if (cpuDifficulty === 'easy') {
    if (oppBest >= 4) return 4600;           // 相手の4連だけはブロック
    const offScore = myBest  * myBest  * 10; // 攻め（係数を12→10に下げ）
    const defScore = oppBest * 5;            // 守り（弱め）
    return offScore + defScore + captureCount * 35 + Math.random() * 160;
  }

  // ── 普通 / 強い 共通：封鎖脅威チェック ──────────────────
  const virtualOpp = sealedSpots
    .filter(s => s.until > totalTurns)
    .map(s => ({x: s.x, y: s.y, r: R, p: opp}));
  let sealedWinThreat = false;
  if (virtualOpp.length > 0) {
    virtualOpp.forEach(v => circles.push(v));
    sealedWinThreat = !!checkWin(opp);
    virtualOpp.forEach(() => circles.pop());
  }
  const offMult  = sealedWinThreat ? 5 : 1;
  const capBonus = sealedWinThreat ? captureCount * 400 : captureCount * 280;

  // ── 普通 ─────────────────────────────────────────────
  if (cpuDifficulty === 'normal') {
    if (my4Count >= 2) return 9500;
    if (myBest >= 4)   return 4800 + captureCount * 100;
    if (opp4Count >= 2) return 4700;
    if (oppBest >= 4)   return 4600 + myBest * 50;
    const offScore = myBest  * myBest  * 28 * offMult;
    const defScore = oppBest * oppBest * 22;
    return offScore + defScore + capBonus + Math.random() * 8;
  }

  // ── 強い：3連ダブル脅威まで読む、ランダム幅最小 ────────
  if (my4Count >= 2)  return 9500;
  if (myBest >= 4)    return 4800 + captureCount * 100;
  if (opp4Count >= 2) return 4700;
  if (oppBest >= 4)   return 4600 + myBest * 50;
  if (my3Count >= 2)  return 3200 + captureCount * 80;  // ダブル3連の構築→次の2手で詰み
  if (opp3Count >= 2) return 3100 + myBest * 40;        // 相手のダブル3連を先に潰す
  const offScore = myBest  * myBest  * 34 * offMult;
  const defScore = oppBest * oppBest * 28;
  return offScore + defScore + capBonus + Math.random() * 3;
}

// CPUのターン処理
function cpuTurn() {
  if (state !== 'play' || turn !== CPU_PL) return;
  const cands = getCandidates();
  if (cands.length === 0) { turn = 1; updateHUD(); return; }

  let best = null, bestScore = -Infinity;
  for (const pos of cands) {
    const s = scoreMove(pos);
    if (s > bestScore) { bestScore = s; best = pos; }
  }
  if (!best) { turn = 1; updateHUD(); return; }

  saveState();
  const prevBestCpu = getLineChains(CPU_PL).reduce((m, c) => Math.max(m, c.length), 0);
  const newCircle = {x: best.x, y: best.y, r: R, p: CPU_PL, justPlaced: performance.now()};
  circles.push(newCircle);

  const won = checkWin(CPU_PL);
  if (won) {
    winGroup = won;
    state = 'over';
    soundWin();
    recordResult(CPU_PL);
    showWin('CPU WIN!', '#5555ff', `CPU が ${won.length} 個直線に並べました！`);
    return;
  }

  totalTurns++;
  const captured = doQiCaptures(newCircle, CPU_PL);
  if (captured > 0) {
    msgEl.textContent = `🤖 CPU が気で ${captured}個の円を取りました！`;
    soundCapture(captured);
  } else {
    const newBestCpu = getLineChains(CPU_PL).reduce((m, c) => Math.max(m, c.length), 0);
    if (newBestCpu >= 3 && newBestCpu > prevBestCpu) soundChain(newBestCpu);
    else soundPlace();
  }

  turn = 1;
  snapPos = null;
  updateHUD();
}

// ---- メッセージ更新 ----
function updateHUD() {
  if (state === 'play') {
    const diffLabel = {easy:'入門', normal:'普通', hard:'強い'};
    if (mode === 'cpu' && turn === CPU_PL)
      msgEl.textContent = `🤖 CPU（${diffLabel[cpuDifficulty]}）が考えています…`;
    else if (mode === 'cpu')
      msgEl.textContent = 'あなたのターン';
    else
      msgEl.textContent = `Player ${turn} のターン`;
  }
}

// ---- 描画 ----
function draw() {
  ctx.clearRect(0, 0, W, H);
  const now = performance.now();

  // グリッド
  ctx.strokeStyle = '#0d0d1a';
  ctx.lineWidth = 1;
  for (let x=0; x<=W; x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<=H; y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // 封鎖マーク（捕獲された場所）
  for (const s of sealedSpots) {
    const rem = s.until - totalTurns;
    if (rem <= 0) continue;
    ctx.save();
    // 背景塗りつぶし（暗い赤）
    ctx.fillStyle = 'rgba(80,10,10,0.82)';
    ctx.beginPath(); ctx.arc(s.x, s.y, R * 0.72, 0, Math.PI*2); ctx.fill();
    // 縁取り
    ctx.strokeStyle = '#cc2222';
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 8; ctx.shadowColor = '#ff0000';
    ctx.beginPath(); ctx.arc(s.x, s.y, R * 0.72, 0, Math.PI*2); ctx.stroke();
    // ×マーク
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 3;
    const d = R * 0.38;
    ctx.beginPath();
    ctx.moveTo(s.x-d, s.y-d); ctx.lineTo(s.x+d, s.y+d);
    ctx.moveTo(s.x+d, s.y-d); ctx.lineTo(s.x-d, s.y+d);
    ctx.stroke();
    // 残りターン数（×の下）
    ctx.fillStyle = '#ffaaaa';
    ctx.font = `bold ${R * 0.44}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(rem, s.x, s.y + R * 0.88);
    ctx.restore();
  }

  // 配置可能ゾーン（既存円の周囲にうっすら点線リング）
  if (state === 'play') {
    ctx.save();
    ctx.setLineDash([4, 5]);
    ctx.lineWidth = 1;
    for (const c of circles) {
      ctx.strokeStyle = c.p===1 ? 'rgba(255,80,80,0.10)' : 'rgba(80,80,255,0.10)';
      ctx.beginPath();
      ctx.arc(c.x, c.y, SNAP_DIST, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  // 直線継続ゾーン（現在のターンプレイヤーの円から ±30° アーク）
  if (state === 'play' && circles.length >= 2) {
    const pc = circles.filter(c => c.p === turn);
    ctx.save();
    ctx.lineWidth = 2.5;
    for (const c of pc) {
      const nbrs = pc.filter(n => n !== c && touching(n, c));
      for (const n of nbrs) {
        const dir = Math.atan2(c.y - n.y, c.x - n.x); // n→c の延長方向
        ctx.strokeStyle = turn === 1
          ? 'rgba(255,160,80,0.55)'
          : 'rgba(80,160,255,0.55)';
        ctx.beginPath();
        ctx.arc(c.x, c.y, SNAP_DIST, dir - Math.PI/6, dir + Math.PI/6);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // 接続ライン（同色・接触している円の間）
  for (let i=0; i<circles.length; i++) {
    for (let j=i+1; j<circles.length; j++) {
      const a=circles[i], b=circles[j];
      if (a.p!==b.p || !touching(a,b)) continue;
      const isWin = winGroup.includes(a) && winGroup.includes(b);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = isWin
        ? (a.p===1 ? 'rgba(255,180,0,0.85)' : 'rgba(100,200,255,0.85)')
        : (a.p===1 ? 'rgba(255,80,80,0.30)'  : 'rgba(80,80,255,0.30)');
      ctx.lineWidth = isWin ? 4 : 1.5;
      ctx.stroke();
    }
  }

  // 円本体
  for (const c of circles) {
    const isWin  = winGroup.includes(c);
    const col1   = c.p===1 ? '#ff5555' : '#5577ff';
    const col2   = c.p===1 ? '#441111' : '#111133';
    const opp    = c.p===1 ? 2 : 1;
    const qi     = getQi(c);
    const press  = getPressure(c, opp);
    const inAtari = !isWin && press > 0 && press >= qi; // 次に捕獲される危険

    // dying（捕獲中）はフェードアウト
    if (c.dying) {
      const elapsed = performance.now() - c.dyingAt;
      const alpha = Math.max(0, 1 - elapsed / 650);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 18; ctx.shadowColor = '#ffffff';
      ctx.beginPath(); ctx.arc(c.x, c.y, R + 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      continue;
    }

    // CPU が置いた直後の点滅（3回）
    if (c.justPlaced) {
      const elapsed = now - c.justPlaced;
      const duration = 1200;
      if (elapsed < duration) {
        const pulse = Math.abs(Math.sin(elapsed * Math.PI / 400)); // 400msごとに1回＝3回
        ctx.save();
        ctx.strokeStyle = `rgba(255,255,255,${0.85 * pulse})`;
        ctx.lineWidth = 3.5;
        ctx.shadowBlur = 24 * pulse;
        ctx.shadowColor = '#aaccff';
        ctx.beginPath(); ctx.arc(c.x, c.y, R + 9, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      } else {
        delete c.justPlaced;
      }
    }

    // 勝利グループのグロー
    if (isWin) {
      const pulse = 0.65 + 0.35 * Math.sin(now/180);
      ctx.save();
      ctx.shadowBlur  = 22 * pulse;
      ctx.shadowColor = c.p===1 ? '#ff9900' : '#44aaff';
      ctx.strokeStyle = c.p===1 ? '#ffcc00' : '#66ccff';
      ctx.lineWidth   = 3.5;
      ctx.beginPath(); ctx.arc(c.x, c.y, R+5, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // アタリ警告リング（捕獲されそうな円）
    if (inAtari) {
      const pulse = 0.5 + 0.5 * Math.sin(now / 800); // ゆっくり「ぼうー」
      ctx.save();
      ctx.strokeStyle = `rgba(255,200,0,${0.9 * pulse})`;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 14 * pulse; ctx.shadowColor = '#ffcc00';
      ctx.beginPath(); ctx.arc(c.x, c.y, R+5, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // グラデーション塗り
    const g = ctx.createRadialGradient(c.x-R*0.3, c.y-R*0.3, R*0.05, c.x, c.y, R);
    g.addColorStop(0, col1);
    g.addColorStop(1, col2);
    ctx.beginPath(); ctx.arc(c.x, c.y, R, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = isWin ? (c.p===1?'#ffcc00':'#66ccff') : col1;
    ctx.lineWidth = 1.5; ctx.stroke();

    // 気の数値を表示（アタリ中は黄色で強調）
    ctx.fillStyle = inAtari ? 'rgba(255,220,50,0.95)' : 'rgba(255,255,255,0.45)';
    ctx.font = `bold ${R*0.5}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(qi, c.x, c.y);
  }

  // 直線チェーンライン（円の上に描いて視認性を確保）
  // 重なっても輝度が増さないよう、長さごとにオフスクリーンへ全描画してから合成
  for (const pl of [1, 2]) {
    const chains = getLineChains(pl).filter(c => c.length >= 3);
    if (!chains.length) continue;

    const groups = [
      { test: n => n >= 5,
        color: pl===1 ? [255,210,0]   : [0,230,255],   alpha: 0.95,
        lineWidth: 3,   shadowBlur: 12,
        shadowColor: pl===1 ? '#ffcc00' : '#00eeff' },
      { test: n => n === 4,
        color: pl===1 ? [255,130,0]   : [0,200,255],   alpha: 0.85,
        lineWidth: 2.5, shadowBlur: 6,
        shadowColor: pl===1 ? '#ff8800' : '#00ccff' },
      { test: n => n === 3,
        color: pl===1 ? [255,180,100] : [100,180,255], alpha: 0.45,
        lineWidth: 1.5, shadowBlur: 0,
        shadowColor: 'transparent' },
    ];

    for (const g of groups) {
      const sub = chains.filter(c => g.test(c.length));
      if (!sub.length) continue;

      // オフスクリーンキャンバスに不透明で描く（重なっても輝度不変）
      const off = document.createElement('canvas');
      off.width = W; off.height = H;
      const oc = off.getContext('2d');
      oc.strokeStyle = `rgb(${g.color[0]},${g.color[1]},${g.color[2]})`;
      oc.lineWidth   = g.lineWidth;
      oc.lineCap     = 'round';
      oc.lineJoin    = 'round';
      if (g.shadowBlur > 0) {
        oc.shadowBlur  = g.shadowBlur;
        oc.shadowColor = g.shadowColor;
      }
      oc.beginPath();
      for (const chain of sub) {
        oc.moveTo(chain[0].x, chain[0].y);
        for (let i = 1; i < chain.length; i++) oc.lineTo(chain[i].x, chain[i].y);
      }
      oc.stroke();

      // 主キャンバスへ一度だけ合成（alpha を一回だけ適用）
      ctx.save();
      ctx.globalAlpha = g.alpha;
      ctx.drawImage(off, 0, 0);
      ctx.restore();
    }
  }

  // スナップ位置プレビュー
  if (mouse && state==='play') {
    if (snapPos) {
      const col    = turn===1 ? 'rgba(255,80,80,0.28)' : 'rgba(80,80,255,0.28)';
      const dotCol = turn===1 ? '#ff5555' : '#5577ff';
      ctx.save();
      // プレビュー円（snapPos がそのまま置かれる位置）
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(snapPos.x, snapPos.y, R, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = dotCol;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4,3]);
      ctx.stroke();
      ctx.setLineDash([]);
      // 中心ドット
      ctx.fillStyle = dotCol;
      ctx.shadowBlur = 6; ctx.shadowColor = dotCol;
      ctx.beginPath(); ctx.arc(snapPos.x, snapPos.y, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // 接点の光るドット（ゲームと同じ touching() で判定）
      const touching_circles = live().filter(c => touching(snapPos, c));
      for (const tc of touching_circles) {
        const cx = (snapPos.x + tc.x) / 2;
        const cy = (snapPos.y + tc.y) / 2;
        ctx.save();
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 16; ctx.shadowColor = '#ffffff';
        ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 8;
        ctx.fillStyle = dotCol;
        ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    } else if (circles.length > 0) {
      // 無効な位置 — 薄い×印
      ctx.save();
      ctx.strokeStyle = 'rgba(255,60,60,0.35)';
      ctx.lineWidth = 2;
      const s = 12;
      ctx.beginPath();
      ctx.moveTo(mouse.x-s, mouse.y-s); ctx.lineTo(mouse.x+s, mouse.y+s);
      ctx.moveTo(mouse.x+s, mouse.y-s); ctx.lineTo(mouse.x-s, mouse.y+s);
      ctx.stroke();
      ctx.restore();
    }
  }

  // チュートリアルターゲット表示（最前面に描く）
  drawTutorialIndicator();

  // 最初の1手ガイド
  if (circles.length === 0 && state === 'play' && !tutorialMode) {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 700);
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.round(W * 0.036)}px 'Segoe UI', Meiryo, sans-serif`;
    ctx.fillStyle = `rgba(160,180,240,${0.6 + 0.25 * pulse})`;
    ctx.shadowBlur = 18 * pulse;
    ctx.shadowColor = 'rgba(100,130,255,0.5)';
    ctx.fillText('最初の 1 手をどうぞ', W / 2, H * 0.18);
    ctx.font = `bold ${Math.round(W * 0.026)}px 'Segoe UI', Meiryo, sans-serif`;
    ctx.fillStyle = `rgba(160,175,230,${0.55 + 0.2 * pulse})`;
    ctx.shadowBlur = 8 * pulse;
    ctx.fillText('どこにでも置けます', W / 2, H * 0.18 + 38);
    ctx.restore();
  }

  requestAnimationFrame(draw);
}

// ---- 座標変換ユーティリティ ----
function canvasCoords(clientX, clientY) {
  const r = cv.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top)  * (H / r.height)
  };
}

// ---- 円の配置処理（マウス・タッチ共通） ----
function handlePlace(mx, my, precomputed) {
  if (state !== 'play') return;

  // ---- チュートリアルモード ----
  if (tutorialMode) {
    const step = TUT[tutorialStep];
    if (step.type !== 'place') return;

    const pos = precomputed || findSnap(mx, my);

    if (step.target) {
      // 対象ターゲットへの近さをチェック
      const checkPos = pos || {x: mx, y: my};
      if (!pos || Math.hypot(pos.x - step.target.x, pos.y - step.target.y) > step.tolerance) {
        msgEl.textContent = '⚠ 矢印の場所に置いてください';
        return;
      }
      // ターゲット位置に正確に配置
      const placed = {x: step.target.x, y: step.target.y, r: R, p: turn};
      circles.push(placed);

      if (step.afterCapture) {
        totalTurns++;
        doQiCaptures(placed, turn);
        msgEl.textContent = '💨 捕獲しました！';
        setTimeout(() => advanceTutorial(), 1600);
      } else if (step.isWinStep) {
        const won = checkWin(turn);
        if (won) {
          winGroup = won; state = 'over';
          overTitle.textContent = `PLAYER ${turn} WIN!`;
          overTitle.style.color = '#ff5555';
          overEl.classList.add('show');
          msgEl.textContent = '🎉 5個を直線に並べました！';
          setTimeout(() => { overEl.classList.remove('show'); advanceTutorial(); }, 2200);
        } else {
          setTimeout(() => advanceTutorial(), 700);
        }
      } else {
        msgEl.textContent = '';
        setTimeout(() => advanceTutorial(), 750);
      }
    } else {
      // ターゲットなし（ステップ1: どこでも可）
      const fx = pos || { x: Math.max(R+4, Math.min(W-R-4, mx)),
                          y: Math.max(R+4, Math.min(H-R-4, my)) };
      circles.push({...fx, r: R, p: turn});
      msgEl.textContent = '';
      setTimeout(() => advanceTutorial(), 750);
    }
    return; // 通常のゲームロジックには入らない
  }

  if (mode === 'cpu' && turn === CPU_PL) return;

  const pos = precomputed || findSnap(mx, my);
  if (!pos) {
    msgEl.textContent = '⚠ そこには置けません。既存の円に接する位置を選んでください';
    return;
  }

  saveState();
  const prevBest = getLineChains(turn).reduce((m, c) => Math.max(m, c.length), 0);
  const newCircle = {x: pos.x, y: pos.y, r: R, p: turn};
  circles.push(newCircle);

  const won = checkWin(turn);
  if (won) {
    winGroup = won;
    state = 'over';
    soundWin();
    recordResult(turn);
    const col = turn===1 ? '#ff5555' : '#5555ff';
    showWin(`PLAYER ${turn} WIN!`, col, `🎉 Player ${turn} が ${won.length} 個直線に並べました！`);
    return;
  }

  totalTurns++;
  const captured = doQiCaptures(newCircle, turn);
  if (captured > 0) {
    msgEl.textContent = `💨 ${captured}個の円を気で取りました！`;
    soundCapture(captured);
  } else {
    const newBest = getLineChains(turn).reduce((m, c) => Math.max(m, c.length), 0);
    if (newBest >= 3 && newBest > prevBest) soundChain(newBest);
    else soundPlace();
  }

  turn = turn === 1 ? 2 : 1;
  snapPos = findSnap(mx, my);
  updateHUD();
  if (mode === 'cpu' && turn === CPU_PL) setTimeout(cpuTurn, CPU_DELAY);
}

// ---- マウス入力 ----
cv.addEventListener('mousemove', e => {
  touchActive = false;
  const {x, y} = canvasCoords(e.clientX, e.clientY);
  mouse = {x, y};
  if (state==='play') snapPos = findSnap(x, y);
});
cv.addEventListener('mouseleave', () => { mouse=null; snapPos=null; });
cv.addEventListener('click', e => {
  const {x, y} = canvasCoords(e.clientX, e.clientY);
  handlePlace(x, y);
});

// ---- タッチ入力 ----
// 指の位置より TOUCH_LIFT 分上でスナップ計算 → プレビューが指で隠れない
function touchSnap(clientX, clientY) {
  const {x, y} = canvasCoords(clientX, clientY);
  const ey = y - TOUCH_LIFT; // 指より上の有効位置
  mouse = {x, y: ey};        // マウス位置も同じ高さに（×印表示用）
  if (state === 'play') snapPos = findSnap(x, ey);
}

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  touchActive = true;
  touchSnap(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: false});

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  touchActive = true;
  touchSnap(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: false});

cv.addEventListener('touchend', e => {
  e.preventDefault();
  // snapPos（プレビューが出ていた位置）に確定配置
  const currentSnap = snapPos;
  touchActive = false;
  mouse = null;
  snapPos = null;
  if (currentSnap) {
    handlePlace(currentSnap.x, currentSnap.y, currentSnap);
  }
}, {passive: false});

// ---- 勝利表示 ----
function showWin(title, color, msg) {
  overTitle.textContent = title;
  overTitle.style.color = color;
  msgEl.textContent = msg;
  updateHUD();
  // ① 大テキストを即表示（盤面は透けて見える）
  overEl.classList.add('show');
  // ② 2.5秒後：大テキストを消してコーナーバッジ＋RESTARTを表示
  setTimeout(() => {
    overEl.classList.remove('show');
    overCornerTitle.textContent = title;
    overCornerTitle.style.color = color;
    overCorner.classList.add('show');
    restartArea.classList.add('show');
  }, 2500);
}

// ---- 勝敗統計（localStorage） ----
const STATS_KEY = 'rl5stats';
function defaultStats() {
  return {
    pvp: { p1: 0, p2: 0 },
    cpu: {
      easy:   { win: 0, loss: 0 },
      normal: { win: 0, loss: 0 },
      hard:   { win: 0, loss: 0 },
    }
  };
}
let stats = (() => {
  try {
    const s = JSON.parse(localStorage.getItem(STATS_KEY));
    if (s && s.pvp && s.cpu) return s;
  } catch(e) {}
  return defaultStats();
})();

function saveStats() {
  try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch(e) {}
}

function recordResult(winnerPlayer) {
  if (tutorialMode) return;
  if (mode === 'pvp') {
    if (winnerPlayer === 1) stats.pvp.p1++;
    else stats.pvp.p2++;
  } else if (mode === 'cpu') {
    if (winnerPlayer === 1) stats.cpu[cpuDifficulty].win++;
    else stats.cpu[cpuDifficulty].loss++;
  }
  saveStats();
}

function renderStats() {
  document.getElementById('st-p1w').textContent = stats.pvp.p1;
  document.getElementById('st-p2w').textContent = stats.pvp.p2;

  const cpuW = Object.values(stats.cpu).reduce((s, d) => s + d.win,  0);
  const cpuL = Object.values(stats.cpu).reduce((s, d) => s + d.loss, 0);
  document.getElementById('st-cpu-w').textContent = cpuW;
  document.getElementById('st-cpu-l').textContent = cpuL;
  const total = cpuW + cpuL;
  document.getElementById('st-cpu-rate').textContent =
    total > 0 ? `(${Math.round(cpuW / total * 100)}%)` : '';

  const diffLabel = { easy: '入門', normal: '普通', hard: '強い' };
  ['easy', 'normal', 'hard'].forEach(d => {
    const { win, loss } = stats.cpu[d];
    const el = document.getElementById(`dst-${d}`);
    el.innerHTML =
      `${diffLabel[d]} <span class="sw">${win}勝</span><span class="sl">${loss}敗</span>`;
  });
}

document.getElementById('stats-reset-btn').addEventListener('click', () => {
  if (!confirm('記録をすべてリセットしますか？')) return;
  stats = defaultStats();
  saveStats();
  renderStats();
});

function showStartScreen() {
  document.getElementById('mode-select').style.display = 'flex';
  document.getElementById('diff-select').style.display = 'none';
  document.getElementById('start').style.display = 'flex';
  msgEl.style.display = 'none';
  document.getElementById('rules').style.display = 'none';
  document.getElementById('rules-link').style.display = 'none';
  renderStats();
}

function startGame(selectedMode) {
  mode = selectedMode;
  circles=[]; turn=1; state='play'; winGroup=[]; snapPos=null;
  sealedSpots=[]; totalTurns=0; history=[];
  document.getElementById('start').style.display = 'none';
  overEl.classList.remove('show');
  overCorner.classList.remove('show');
  restartArea.classList.remove('show');
  msgEl.style.display = '';
  msgEl.textContent = '';
  document.getElementById('rules').style.display = '';
  document.getElementById('rules-link').style.display = '';
  updateHUD();
}

document.getElementById('btn-pvp').addEventListener('click', () => startGame('pvp'));

document.getElementById('btn-tut').addEventListener('click', startTutorial);

// チュートリアルパネルのボタン
document.getElementById('tut-next').addEventListener('click', () => {
  if (!tutorialMode) return;
  advanceTutorial();
});
document.getElementById('tut-skip').addEventListener('click', endTutorial);
document.getElementById('tut-pvp').addEventListener('click', () => { endTutorial(); startGame('pvp'); });
document.getElementById('tut-cpu').addEventListener('click', () => { endTutorial(); startGame('cpu'); });

document.getElementById('btn-restart').addEventListener('click', () => {
  overEl.classList.remove('show');
  overCorner.classList.remove('show');
  restartArea.classList.remove('show');
  circles=[]; turn=1; state='play'; winGroup=[]; snapPos=null;
  sealedSpots=[]; totalTurns=0; history=[];
  showStartScreen();
});

document.getElementById('btn-undo').addEventListener('click', () => {
  if (history.length === 0) return;
  const prev = history.pop();
  circles     = prev.circles;
  turn        = prev.turn;
  sealedSpots = prev.sealedSpots;
  totalTurns  = prev.totalTurns;
  winGroup = [];
  state    = 'play';
  // CPU対戦でCPUのターンに戻った場合はプレイヤー側に切り替え
  if (mode === 'cpu' && turn === CPU_PL) turn = 1;
  overEl.classList.remove('show');
  overCorner.classList.remove('show');
  restartArea.classList.remove('show');
  msgEl.textContent = `↩ 1手戻しました — Player ${turn} のターン`;
  updateHUD();
});

// ---- 起動 ----
showStartScreen();
requestAnimationFrame(draw);
</script>
</body>
</html>
